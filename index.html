<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 카페달파도 재고관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8; --surface: #ffffff; --surface2: #eef0f4;
    --border: #dce0e8; --accent: #d97706; --accent2: #0891b2;
    --warn: #ea580c; --danger: #dc2626;
    --text: #1a1d2e; --text2: #6b7084;
    --row-hover: #f0f1f5; --selected: #fef3c7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .sync-badge {
    font-size: 11px; padding: 3px 10px; border-radius: 10px;
    background: #fef3c7; color: var(--accent); border: 1px solid var(--accent);
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .sync-badge.offline { background: #fee2e2; color: var(--danger); border-color: var(--danger); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .toolbar { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .btn {
    font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #ffffff; border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { background: #fbbf24; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: #fee2e2; }



  .filterbar {
    display: flex; gap: 10px; padding: 10px 20px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    align-items: center; flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 280px; }
  .search-wrap input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px 6px 30px; color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 13px; pointer-events: none; }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .chip {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap;
  }
  .chip:hover, .chip.active { border-color: var(--accent); color: var(--accent); background: #fef3c7; }
  .manage-cat-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    border: 1px dashed var(--border); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif;
  }
  .manage-cat-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .table-wrap { overflow-x: auto; overflow-y: auto; padding-bottom: 80px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 360px; }
  thead th {
    background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 7px 8px; text-align: left; font-size: 11px; font-weight: 500;
    color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px;
    white-space: nowrap; user-select: none; cursor: pointer;
  }
  thead th:hover { color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.08s; }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.selected { background: var(--selected); }
  tbody tr.low-stock td:first-child { }
  tbody tr.out-stock td:first-child { }
  td { padding: 0; vertical-align: middle; }
  td.cell-inner { padding: 4px 8px; }

  .editable {
    padding: 5px 8px; min-height: 30px; cursor: text; outline: none;
    transition: background 0.1s; border-right: 1px solid transparent; white-space: nowrap;
  }
  .editable:focus { background: #e8f4fe; border-right: 1px solid var(--accent2); color: var(--accent2); }

  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; }

  .qty-wrap { display: flex; align-items: center; gap: 3px; padding: 4px 8px; }
  .qty-btn {
    width: 22px; height: 22px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
  }
  .qty-btn:hover { border-color: var(--accent); color: var(--accent); background: #fef3c7; }
  .qty-num { font-family: 'DM Mono', monospace; font-size: 13px; min-width: 36px; text-align: center; font-weight: 500; cursor: text; outline: none; }

  .row-check { padding: 4px 8px; text-align: center; }
  input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

  .status { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .status-ok { background: #dcfce7; color: #16a34a; }
  .status-low { background: #fef3c7; color: var(--warn); }
  .status-out { background: #fee2e2; color: var(--danger); }

  .drag-handle { padding: 4px 6px; color: var(--text2); cursor: grab; font-size: 14px; user-select: none; }
  .drag-handle:active { cursor: grabbing; }
  tbody tr.dragging-row { opacity: 0.4; }
  tbody tr.drag-over-row { border-top: 2px solid var(--accent); }

  .delivery-badge { font-size: 11px; padding: 3px 9px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .delivery-shipping { background: #ede9fe; color: #7c3aed; border: 1px solid #a78bfa; }
  .delivery-done { background: #dcfce7; color: #16a34a; border: 1px solid #4ade80; }
  .delivery-waiting { background: #fef3c7; color: #ea580c; border: 1px solid #fb923c; }

  .loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 999; transition: opacity 0.4s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text2); font-size: 14px; }

  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 200; backdrop-filter: blur(4px); align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 380px; max-width: 95vw; max-height: 90vh; overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .modal h3 { margin-bottom: 16px; font-size: 15px; }
  .modal label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .modal input, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; outline: none; margin-bottom: 12px;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal select option { background: var(--surface2); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

  .cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .cat-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    cursor: grab; transition: all 0.15s;
  }
  .cat-item.dragging { opacity: 0.4; border-style: dashed; }
  .cat-item.drag-over { border-color: var(--accent); background: #fef3c7; }
  .cat-drag { color: var(--text2); font-size: 14px; cursor: grab; user-select: none; padding: 0 2px; }
  .cat-del-btn {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s;
  }
  .cat-del-btn:hover { color: var(--danger); background: #fee2e2; }
  .add-cat-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
  .add-cat-row input { margin-bottom: 0 !important; }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 12px;
    font-size: 12px; color: var(--text2); z-index: 100;
  }
  .sel-info { color: var(--accent2); font-weight: 500; }
  .spacer { flex: 1; }

  /* Tab nav */
  .tab-nav {
    display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 53px; z-index: 99;
  }
  .tab-btn {
    flex: 1; padding: 10px; font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 500; background: none; border: none;
    color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Leave management */
  .leave-wrap { padding: 16px 16px 100px; }
  .leave-month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .leave-month-title { font-size: 16px; font-weight: 700; color: var(--accent); }
  .month-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 4px 12px; font-size: 16px; cursor: pointer;
  }
  .leave-calendar {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 16px;
  }
  .cal-header { text-align: center; font-size: 11px; color: var(--text2); padding: 4px 0; font-weight: 500; }
  .cal-day {
    text-align: center; padding: 8px 4px; border-radius: 8px;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
    border: 1px solid transparent; position: relative;
  }
  .cal-day:hover { background: var(--surface2); }
  .cal-day.empty { cursor: default; }
  .cal-day.has-leave { background: #fef3c7; border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .cal-day.today { border-color: var(--accent2); color: var(--accent2); }
  .leave-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); margin: 1px auto 0; }

  .leave-list-section { margin-top: 8px; }
  .leave-list-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px; }
  .leave-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 6px;
  }
  .leave-item-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); min-width: 60px; }
  .leave-item-name { font-size: 13px; font-weight: 500; flex: 1; }
  .leave-item-del { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .leave-item-del:hover { color: var(--danger); }

  .leave-add-btn {
    width: 100%; padding: 12px; background: var(--surface2); border: 1px dashed var(--border);
    border-radius: 8px; color: var(--text2); font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.15s; margin-top: 8px;
  }
  .leave-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .staff-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }

  .day-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .day-btn.active { background: var(--accent); color: #ffffff; border-color: var(--accent); font-weight: 700; }
  .regular-tag {
    font-size: 10px; color: var(--accent2); background: #e0f7fa;
    border: 1px solid var(--accent2); border-radius: 4px; padding: 1px 5px; margin-left: 4px;
  }

  /* Login screen */
  .login-screen {
    position: fixed; inset: 0;
    background: linear-gradient(145deg, #f8f9fc 0%, #eef0f8 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; transition: opacity 0.3s;
  }
  .login-screen.hidden { display: none; }
  .login-box {
    display: flex; flex-direction: column; gap: 16px; align-items: center;
    width: 320px; max-width: 92vw;
    background: #ffffff;
    border-radius: 24px;
    padding: 48px 36px 40px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  }
  .login-logo-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    margin-bottom: 4px;
  }
  .login-logo-svg { width: 100px; height: 100px; opacity: 0.95; }
  .login-brand {
    font-size: 18px; font-weight: 300; letter-spacing: 5px;
    color: #1a1d2e; font-family: 'Noto Sans KR', sans-serif;
  }
  .login-brand span { font-weight: 700; }
  .login-subtitle {
    font-size: 12px; color: #9ca3af; letter-spacing: 1px;
    font-family: 'Noto Sans KR', sans-serif; margin-top: -8px; margin-bottom: 4px;
  }
  .login-input {
    width: 100%; background: #f8f9fc; border: 1.5px solid #e5e7eb;
    border-radius: 12px; padding: 14px 16px; color: #1a1d2e;
    font-family: 'DM Mono', monospace; font-size: 22px; outline: none;
    text-align: center; letter-spacing: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-input::placeholder { letter-spacing: 4px; font-size: 16px; color: #c9cdd4; }
  .login-input:focus {
    border-color: #1a1d2e;
    box-shadow: 0 0 0 3px rgba(26,29,46,0.07);
    background: #fff;
  }
  .login-input.shake { border-color: #f87171; animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .login-err { font-size: 12px; color: #f87171; min-height: 16px; text-align: center; font-family: 'Noto Sans KR', sans-serif; }
  .login-enter-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    background: #1a1d2e; border: none;
    color: #ffffff; font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    letter-spacing: 3px;
  }
  .login-enter-btn:hover {
    background: #2e3350;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(26,29,46,0.18);
  }
  .login-enter-btn:active { transform: translateY(0); box-shadow: none; }

  .toast {
    position: fixed; bottom: 60px; right: 20px;
    background: #ffffff; border: 1px solid var(--accent); color: var(--accent);
    padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
    z-index: 300; transform: translateY(20px); opacity: 0; transition: all 0.25s; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>

<!-- Admin Auth Modal -->
<div class="modal-bg" id="modal-admin-auth">
  <div class="modal" style="width:300px;text-align:center">
    <h3>⚙️ 관리자 인증</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:14px">관리자 비밀번호를 입력하세요</p>

      <button class="btn" onclick="closeAdminAuth()">취소</button>

    </div>
  </div>
</div>

<!-- Admin Menu Modal -->
<div class="modal-bg" id="modal-admin-menu">

<script type="module">

import { getDatabase, ref, onValue, push, remove, update, set }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDAGS7E7a2QMorurLa9kseaBmeDB40Kxu8",
  authDomain: "kitchen-inventory-d0a04.firebaseapp.com",
  databaseURL: "https://kitchen-inventory-d0a04-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kitchen-inventory-d0a04",
  storageBucket: "kitchen-inventory-d0a04.firebasestorage.app",
  messagingSenderId: "891824296078",
  appId: "1:891824296078:web:d989839e0e0e92acb7f9df"
});

const db = getDatabase(app);
const itemsRef = ref(db, 'inventory');
const catsRef = ref(db, 'categories');
const staffPwRef = ref(db, 'config/staffPassword');
const adminPwRef = ref(db, 'config/adminPassword');
const orderRef = ref(db, 'itemOrder');
const leaveRef = ref(db, 'leaves');
const staffListRef = ref(db, 'staffList');

let items = {};
let itemOrder = {};
let regularDays = {}; // 직원별 정기휴일
let categories = [];
let filterCat = '전체';
let sortKey = null, sortDir = 1;
let selected = new Set();
let firstLoad = true;
let firstCatLoad = true;
let dragSrcIdx = null;
let staffPassword = null;
let adminPassword = null;
let leaves = {};
let staffList = [];
let currentTab = 'inventory';
let leaveYear = new Date().getFullYear();
let leaveMonth = new Date().getMonth();
let selectedStaff = '전체';

onValue(orderRef, (snap) => {
  itemOrder = snap.val() || {};
  if (!firstLoad) renderTable();
});

onValue(leaveRef, (snap) => {
  leaves = snap.val() || {};
  if (currentTab === 'leave') renderLeave();
});

onValue(staffListRef, (snap) => {
  staffList = snap.val() || [];
  if (!Array.isArray(staffList)) staffList = Object.values(staffList);
  renderStaffFilter();
  renderStaffSelect();
  if (currentTab === 'leave') renderLeave();
});

onValue(regularDaysRef, (snap) => {
  regularDays = snap.val() || {};
  if (currentTab === 'leave') renderLeave();
  if (document.getElementById('modal-staff').classList.contains('open')) renderStaffList();
});

// --- Login ---
const pwPromise = new Promise(resolve => {
  let s = false, a = false;
  onValue(staffPwRef, (snap) => {
    staffPassword = snap.exists() ? snap.val() : '1234';
    if (!snap.exists()) set(staffPwRef, '1234');
    s = true; if (s && a) resolve();
  }, { onlyOnce: true });
  onValue(adminPwRef, (snap) => {
    adminPassword = snap.exists() ? snap.val() : '0000';
    if (!snap.exists()) set(adminPwRef, '0000');
    a = true; if (s && a) resolve();
  }, { onlyOnce: true });
});

window.tryLogin = async function() {
  const input = document.getElementById('login-pw').value;
  const err = document.getElementById('login-err');
  await pwPromise;
  if (input === staffPassword || input === adminPassword) {
    document.getElementById('login-screen').classList.add('hidden');
    err.textContent = '';
  } else {
    err.textContent = '비밀번호가 틀렸습니다';
    const inp = document.getElementById('login-pw');
    inp.classList.add('shake');
    inp.value = '';
    setTimeout(() => inp.classList.remove('shake'), 400);
  }
}

let pwChangeMode = 'self'; // 'self' | 'staff' | 'admin'

window.openPwModal = function(mode = 'self') {
  pwChangeMode = mode;
  ['pw-current','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value='');
  document.getElementById('pw-err').textContent = '';
  const curRow = document.getElementById('pw-current-row');
  if (mode === 'staff') {
    document.getElementById('pw-modal-title').textContent = '👤 직원 비밀번호 변경';
    document.getElementById('pw-modal-desc').textContent = '관리자 권한으로 직원 비밀번호를 변경합니다';
    curRow.style.display = 'none';
  } else if (mode === 'admin') {
    document.getElementById('pw-modal-title').textContent = '🔑 관리자 비밀번호 변경';
    document.getElementById('pw-modal-desc').textContent = '현재 관리자 비밀번호를 입력하세요';
    curRow.style.display = '';
  } else {
    document.getElementById('pw-modal-title').textContent = '🔑 비밀번호 변경';
    document.getElementById('pw-modal-desc').textContent = '현재 비밀번호를 입력하세요';
    curRow.style.display = '';
  }
  document.getElementById('modal-pw').classList.add('open');
  setTimeout(() => document.getElementById(mode === 'staff' ? 'pw-new' : 'pw-current').focus(), 100);
}
window.closePwModal = function() { document.getElementById('modal-pw').classList.remove('open'); }
document.getElementById('modal-pw').addEventListener('click', e => { if(e.target===e.currentTarget) closePwModal(); });

// --- Admin ---
window.openAdminModal = function() {
  document.getElementById('admin-pw-input').value = '';
  document.getElementById('admin-auth-err').textContent = '';
  document.getElementById('modal-admin-auth').classList.add('open');
  setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
}
window.closeAdminAuth = function() { document.getElementById('modal-admin-auth').classList.remove('open'); }
document.getElementById('modal-admin-auth').addEventListener('click', e => { if(e.target===e.currentTarget) closeAdminAuth(); });

window.tryAdminAuth = function() {
  const input = document.getElementById('admin-pw-input').value;
  const err = document.getElementById('admin-auth-err');
  if (input === adminPassword) {
    closeAdminAuth();
    openAdminMenu();
  } else {
    err.textContent = '관리자 비밀번호가 틀렸습니다';
    document.getElementById('admin-pw-input').value = '';
  }
}

window.openAdminMenu = function() { document.getElementById('modal-admin-menu').classList.add('open'); }
window.closeAdminMenu = function() { document.getElementById('modal-admin-menu').classList.remove('open'); }
document.getElementById('modal-admin-menu').addEventListener('click', e => { if(e.target===e.currentTarget) closeAdminMenu(); });

window.adminExportCSV = function() { closeAdminMenu(); exportCSV(); }
window.adminChangeAdminPw = function() { closeAdminMenu(); openPwModal('admin'); }
window.adminChangeStaffPw = function() { closeAdminMenu(); openPwModal('staff'); }

window.changePassword = function() {
  const cur = document.getElementById('pw-current').value;
  const nw = document.getElementById('pw-new').value;
  const cf = document.getElementById('pw-confirm').value;
  const err = document.getElementById('pw-err');
  if (!nw) { err.textContent = '새 비밀번호를 입력해주세요'; return; }
  if (nw !== cf) { err.textContent = '비밀번호가 일치하지 않습니다'; return; }

  if (pwChangeMode === 'staff') {
    // 관리자가 직원 비번 변경 (현재 비번 확인 불필요)
    set(staffPwRef, nw); staffPassword = nw;
    closePwModal(); showToast('👤 직원 비밀번호가 변경되었습니다');
  } else if (pwChangeMode === 'admin') {
    if (cur !== adminPassword) { err.textContent = '현재 관리자 비밀번호가 틀렸습니다'; return; }
    set(adminPwRef, nw); adminPassword = nw;
    closePwModal(); showToast('🔑 관리자 비밀번호가 변경되었습니다');
  } else {
    if (cur !== staffPassword && cur !== adminPassword) { err.textContent = '현재 비밀번호가 틀렸습니다'; return; }
    if (cur === adminPassword) { set(adminPwRef, nw); adminPassword = nw; showToast('🔑 관리자 비밀번호가 변경되었습니다'); }
    else { set(staffPwRef, nw); staffPassword = nw; showToast('🔑 직원 비밀번호가 변경되었습니다'); }
    closePwModal();
  }
}

const DEFAULT_CATS = [
  {emoji:'☕', name:'원두/커피', color:'#f59e0b'},
  {emoji:'🥛', name:'유제품', color:'#a5b4fc'},
  {emoji:'🧴', name:'시럽/소스', color:'#fcd34d'},
  {emoji:'🧊', name:'냉동/얼음', color:'#67e8f9'},
  {emoji:'🥤', name:'음료베이스', color:'#6ee7a0'},
  {emoji:'🍰', name:'디저트/식품', color:'#fca5a5'},
  {emoji:'🧻', name:'소모품', color:'#d1d5db'},
  {emoji:'📦', name:'기타', color:'#94a3b8'},
];

// Firebase listeners
onValue(catsRef, (snap) => {
  if (!snap.exists() && firstCatLoad) {
    set(catsRef, DEFAULT_CATS);
  } else if (snap.exists()) {
    const val = snap.val();
    categories = Array.isArray(val) ? val : Object.values(val);
  }
  firstCatLoad = false;
  renderChips();
  renderCatSelect();
  if (!firstLoad) renderTable();
});

onValue(itemsRef, (snap) => {
  items = snap.val() || {};
  if (firstLoad) {
    firstLoad = false;
    document.getElementById('loading').classList.add('hidden');
  }
  setSyncStatus(true);
  renderTable();
}, () => setSyncStatus(false));

// Save categories to Firebase immediately
function saveCats() {
  set(catsRef, categories);
}

function getCatStyle(catName) {
  const cat = categories.find(c => c.name === catName);
  if (!cat) return {bg:'#f0f0f0', color:'#6b7084'};
  const hex = cat.color || '#888';
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return { bg: `rgba(${r},${g},${b},0.15)`, color: hex };
}
function getCatEmoji(catName) {
  const cat = categories.find(c => c.name === catName);
  return cat ? (cat.emoji || '') : '';
}

function renderChips() {
  const wrap = document.getElementById('filter-chips');
  wrap.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (filterCat==='전체'?' active':'');
  all.textContent = '전체';
  all.onclick = () => { filterCat='전체'; renderChips(); renderTable(); };
  wrap.appendChild(all);
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (filterCat===cat.name?' active':'');
    btn.textContent = (cat.emoji||'') + ' ' + cat.name;
    btn.onclick = () => { filterCat=cat.name; renderChips(); renderTable(); };
    wrap.appendChild(btn);
  });
}

function renderCatSelect() {
  const sel = document.getElementById('m-cat');
  const prev = sel.value;
  sel.innerHTML = '';
  categories.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.name;
    opt.textContent = (cat.emoji||'') + ' ' + cat.name;
    sel.appendChild(opt);
  });
  if (prev) sel.value = prev;
}

window.renderTable = function() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let data = Object.entries(items)
    .map(([k,v]) => ({...v, fbKey:k}))
    .filter(i => (filterCat==='전체' || i.category===filterCat)
      && (!q || [i.name,i.memo,i.location,i.category].some(s=>(s||'').toLowerCase().includes(q))));
  if (sortKey) {
    data.sort((a,b) => {
      let av=a[sortKey]||'', bv=b[sortKey]||'';
      if (['quantity','min'].includes(sortKey)){av=+av;bv=+bv;}
      return av<bv?-sortDir:av>bv?sortDir:0;
    });
  } else {
    // itemOrder 기준 정렬
    data.sort((a,b) => {
      const ao = itemOrder[a.fbKey] ?? 9999;
      const bo = itemOrder[b.fbKey] ?? 9999;
      return ao - bo;
    });
  }

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  data.forEach(item => {
    const qtyRaw = item.quantity;
    const qty = qtyRaw === '주문필요' ? -1 : qtyRaw === '여유있음' ? -2 : (+qtyRaw || 0);
    const qtyColor = qty === -2 ? '#16a34a' : qty <= 4 ? '#dc2626' : '#16a34a';
    const qtyDisplay = qty === -1 ? '주문필요' : qty === -2 ? '여유있음' : qty;
    const rowCls = (qty === -1 || (qty >= 0 && qty <= 4) ? 'out-stock' : '') + (selected.has(item.fbKey) ? ' selected' : '');
    const status = item.quantity===0
      ? '<span class="status status-out">없음</span>'
      : item.quantity<item.min
        ? '<span class="status status-low">부족</span>'
        : '<span class="status status-ok">정상</span>';
    const cs = getCatStyle(item.category);
    const emoji = getCatEmoji(item.category);
    const delivery = item.delivery || '';
    const deliveryBadge = delivery === 'shipping'
      ? '<span class="delivery-badge delivery-shipping">📦 주문완료</span>'
      : delivery === 'waiting'
        ? '<span class="delivery-badge delivery-waiting">⏳ 대기</span>'
        : delivery === 'done'
          ? '<span class="delivery-badge delivery-done">🚚 배송완료</span>'
          : '';

    const tr = document.createElement('tr');
    tr.className = rowCls;
    tr.dataset.fbkey = item.fbKey;
    tr.dataset.delivery = delivery;
    tr.draggable = true;
    tr.innerHTML = `
      <td><span class="drag-handle">⠿</span></td>
      <td class="row-check"><input type="checkbox" ${selected.has(item.fbKey)?'checked':''} onchange="toggleRow('${item.fbKey}',this)"></td>
      <td><div style="display:flex;align-items:center;gap:5px;padding:5px 8px;min-width:0">
        <span class="badge" style="background:${cs.bg};color:${cs.color};flex-shrink:0;font-size:10px;padding:1px 5px">${esc(item.category)}</span>
        <div style="min-width:0;flex:1">
          <div class="editable" contenteditable data-fbkey="${item.fbKey}" data-field="name" onblur="saveCell(this)" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${qty<=4&&qty!==-2?'#dc2626':'var(--text)'}">${esc(item.name)}</div>
        </div>
        ${deliveryBadge}
      </div></td>
      <td><div class="qty-wrap" style="justify-content:center">
        <button class="qty-btn" onclick="adjustQty('${item.fbKey}',-1)">−</button>
        <div class="qty-num editable" contenteditable data-fbkey="${item.fbKey}" data-field="quantity" onblur="saveCell(this)" style="color:${qtyColor}">${qtyDisplay}</div>
        <button class="qty-btn" onclick="adjustQty('${item.fbKey}',1)">+</button>
      </div></td>`;

    const handle = tr.querySelector('.drag-handle');
    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      initTouchDrag(tr, e);
    }, {passive: false});

    tbody.appendChild(tr);
  });

  document.getElementById('row-count').textContent = data.length + '개 항목';
  updateSelUI();
}

function renderCatList() {

  list.innerHTML = '';
  categories.forEach((cat, idx) => {
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.dataset.idx = idx;

        oninput="updateCatField(${idx},'color',this.value)">

    // 터치 드래그 - 모달 스크롤 막기
    const handle = item.querySelector('.cat-drag');
    handle.addEventListener('touchstart', e => {

function initCatTouchDrag(srcEl, srcIdx, e) {
  const list = document.getElementById('cat-list');
  const modal = document.querySelector('#modal-cat .modal');
  srcEl.classList.add('dragging');

  // 드래그 중 모달 스크롤 막기
  const preventScroll = ev => ev.preventDefault();
  modal.addEventListener('touchmove', preventScroll, {passive: false});

  const ghost = srcEl.cloneNode(true);
  ghost.style.cssText = `position:fixed;left:0;top:0;width:${srcEl.offsetWidth}px;opacity:0.75;
    background:var(--surface2);pointer-events:none;z-index:9999;border:1px solid var(--accent);border-radius:8px;padding:8px 10px;`;
  document.body.appendChild(ghost);

  let lastOver = null;

  function onMove(e) {
    e.preventDefault();
    const touch = e.touches[0];
    ghost.style.transform = `translate(${touch.clientX - 20}px, ${touch.clientY - 20}px)`;
    ghost.style.display = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    ghost.style.display = '';
    const targetEl = el?.closest('.cat-item');
    if (lastOver && lastOver !== targetEl) lastOver.classList.remove('drag-over');
    if (targetEl && targetEl !== srcEl) {
      targetEl.classList.add('drag-over');
      lastOver = targetEl;
    }
  }

  function onEnd() {
    srcEl.classList.remove('dragging');
    ghost.remove();
    modal.removeEventListener('touchmove', preventScroll);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    if (lastOver) {
      lastOver.classList.remove('drag-over');
      const tgtIdx = +lastOver.dataset.idx;
      if (srcIdx !== tgtIdx) {
        const moved = categories.splice(srcIdx, 1)[0];
        categories.splice(tgtIdx, 0, moved);
        saveCats();
        renderCatList();
      }
    }
  }

  document.addEventListener('touchmove', onMove, {passive: false});
  document.addEventListener('touchend', onEnd);
}

// 필드 변경 즉시 저장
window.updateCatField = function(idx, field, value) {
  if (!categories[idx]) return;
  if (field === 'name') {
    const oldName = categories[idx].name;
    categories[idx].name = value;
    saveCats();
    // 기존 재고 데이터의 category 필드도 일괄 업데이트
    if (oldName && oldName !== value) {
      Object.entries(items).forEach(([k, item]) => {
        if (item.category === oldName) {
          update(ref(db, `inventory/${k}`), {category: value});
        }
      });
    }
  } else {
    categories[idx][field] = value;
    saveCats();
  }
}

window.adjustQty = function(fbKey, delta) {
  const item = items[fbKey];
  if (!item) return;
  if (item.quantity === '주문필요' && delta < 0) {
    update(ref(db, `inventory/${fbKey}`), {quantity: '여유있음'});
    return;
  }
  if (item.quantity === '여유있음' && delta > 0) {
    update(ref(db, `inventory/${fbKey}`), {quantity: '주문필요'});
    return;
  }
  const cur = (item.quantity === '여유있음' || item.quantity === '주문필요') ? 0 : (+item.quantity || 0);
  const newVal = cur + delta;
  if (newVal < 0) {
    update(ref(db, `inventory/${fbKey}`), {quantity: '주문필요'});
  } else {
    update(ref(db, `inventory/${fbKey}`), {quantity: newVal});
  }
}

// --- Touch drag for row reordering ---
function initTouchDrag(srcRow, e) {
  const tbody = document.getElementById('table-body');
  srcRow.classList.add('dragging-row');

  // 유령 이미지 생성
  const ghost = srcRow.cloneNode(true);
  ghost.style.cssText = `position:fixed;left:0;top:0;width:${srcRow.offsetWidth}px;opacity:0.7;
    background:var(--surface2);pointer-events:none;z-index:9999;border:1px solid var(--accent);border-radius:4px;`;
  document.body.appendChild(ghost);

  let lastOver = null;

  function onMove(e) {
    const touch = e.touches[0];
    ghost.style.transform = `translate(${touch.clientX - 20}px, ${touch.clientY - 20}px)`;

    // 어떤 행 위에 있는지 감지
    ghost.style.display = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    ghost.style.display = '';
    const targetRow = el?.closest('tr[data-fbkey]');

    if (lastOver && lastOver !== targetRow) lastOver.classList.remove('drag-over-row');
    if (targetRow && targetRow !== srcRow) {
      targetRow.classList.add('drag-over-row');
      lastOver = targetRow;
    }
  }

  function onEnd() {
    srcRow.classList.remove('dragging-row');
    ghost.remove();
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);

    if (lastOver) {
      lastOver.classList.remove('drag-over-row');
      const srcKey = srcRow.dataset.fbkey;
      const tgtKey = lastOver.dataset.fbkey;
      if (srcKey !== tgtKey) {
        // 전체 행 목록에서 현재 순서 기반으로 새 순서 계산
        const allKeys = Object.keys(items).sort((a,b) => (itemOrder[a]??9999) - (itemOrder[b]??9999));
        const srcIdx = allKeys.indexOf(srcKey);
        const tgtIdx = allKeys.indexOf(tgtKey);
        allKeys.splice(srcIdx, 1);
        allKeys.splice(tgtIdx, 0, srcKey);
        const orderObj = {};
        allKeys.forEach((k, i) => { orderObj[k] = i; });
        itemOrder = orderObj; // 로컬 즉시 반영
        set(ref(db, 'itemOrder'), orderObj); // Firebase 전체 덮어쓰기
        renderTable();
      }
    }
  }

  document.addEventListener('touchmove', onMove, {passive: false});
  document.addEventListener('touchend', onEnd);
}

window.changeMonth = function(delta) {
  leaveMonth += delta;
  if (leaveMonth > 11) { leaveMonth = 0; leaveYear++; }
  if (leaveMonth < 0) { leaveMonth = 11; leaveYear--; }
  renderLeave();
}

function renderLeave() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('leave-month-title').textContent = `${leaveYear}년 ${months[leaveMonth]}`;

  const monthKey = `${leaveYear}-${String(leaveMonth+1).padStart(2,'0')}`;
  const monthLeaves = Object.entries(leaves)
    .map(([k,v]) => ({...v, key:k}))
    .filter(l => l.date && l.date.startsWith(monthKey))
    .filter(l => selectedStaff === '전체' || l.staff === selectedStaff)
    .sort((a,b) => a.date.localeCompare(b.date));

  const firstDay = new Date(leaveYear, leaveMonth, 1).getDay();
  const daysInMonth = new Date(leaveYear, leaveMonth+1, 0).getDate();
  const today = new Date();

  // 날짜별 이름 맵 (개인휴무)
  const leaveDateMap = {}; // date -> [names]
  monthLeaves.forEach(l => {
    if (!leaveDateMap[l.date]) leaveDateMap[l.date] = [];
    leaveDateMap[l.date].push(l.staff);
  });

  // 정기휴일: 직원별 요일 -> 날짜별 이름
  const regularDateMap = {}; // date -> [names]
  const daysInThisMonth = daysInMonth;
  for (let d = 1; d <= daysInThisMonth; d++) {
    const dateStr = `${leaveYear}-${String(leaveMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(leaveYear, leaveMonth, d).getDay();
    const names = [];
    Object.entries(regularDays).forEach(([name, days]) => {
      if (!days) return;
      if (selectedStaff !== '전체' && name !== selectedStaff) return;
      if (days.includes(dow)) names.push(name);
    });
    if (names.length > 0) regularDateMap[dateStr] = names;
  }

  // Calendar
  const cal = document.getElementById('leave-calendar');
  cal.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-header'; h.textContent = d;
    cal.appendChild(h);
  });

  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    cal.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${leaveYear}-${String(leaveMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const div = document.createElement('div');
    div.className = 'cal-day';
    div.style.cssText = 'padding:4px 2px;font-size:11px;cursor:pointer;';
    const isToday = today.getFullYear()===leaveYear && today.getMonth()===leaveMonth && today.getDate()===d;
    if (isToday) div.classList.add('today');
    const leaveNames = leaveDateMap[dateStr] || [];
    if (leaveNames.length > 0) div.classList.add('has-leave');

    const leaveHTML = leaveNames.map(n =>
      `<div style="font-size:9px;background:#fef3c7;color:var(--accent);border-radius:3px;padding:1px 3px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(n)}</div>`
    ).join('');

    div.innerHTML = `<div style="text-align:center;margin-bottom:2px">${d}</div>${leaveHTML}`;
    div.onclick = () => { document.getElementById('l-date').value = dateStr; openLeaveModal(); };
    cal.appendChild(div);
  }

  // List: 개인 휴무 + 정기휴일 합쳐서 날짜순 정렬
  const list = document.getElementById('leave-list');
  list.innerHTML = '';

  // 정기휴일을 이번달 날짜로 펼치기
  const regularItems = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${leaveYear}-${String(leaveMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const names = regularDateMap[dateStr] || [];
    names.forEach(n => regularItems.push({date: dateStr, staff: n, memo: '정기휴일', isRegular: true}));
  }

  const allItems = monthLeaves.map(l => ({...l, isRegular: false}))
    .sort((a,b) => a.date.localeCompare(b.date) || a.staff.localeCompare(b.staff));

  if (allItems.length === 0) {
    list.innerHTML = `<div style="color:var(--text2);font-size:13px;padding:12px 0">이번 달 일정이 없어요</div>`;
  } else {
    allItems.forEach(l => {
      const item = document.createElement('div');
      item.className = 'leave-item';
      const badge = l.isRegular
        ? `<span style="font-size:10px;color:var(--accent2);background:#e0f7fa;border:1px solid var(--accent2);border-radius:4px;padding:1px 5px;margin-left:4px">정기</span>`
        : '';
      const delBtn = l.isRegular ? '' : `<button class="leave-item-del" onclick="deleteLeave('${l.key}')">✕</button>`;
      item.innerHTML = `
        <div class="leave-item-date">${l.date.slice(5)}</div>
        <div class="leave-item-name">${esc(l.staff)}${badge}${l.memo&&!l.isRegular ? ` <span style="color:var(--text2);font-size:11px">· ${esc(l.memo)}</span>` : ''}</div>
        ${delBtn}`;
      list.appendChild(item);
    });
  }
}

    div.style.flexWrap = 'wrap';
    div.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="leave-item-name">${esc(s)}</div>
        <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;align-items:center">${dayTags}</div>
      </div>
      <button class="btn cyan" onclick="openRegularModal('${esc(s)}')" style="font-size:11px;padding:4px 8px;flex-shrink:0">📆 정기휴일</button>
      <button class="leave-item-del" onclick="deleteStaff(${i})">✕</button>`;
    wrap.appendChild(div);
  });
}

let editingRegularStaff = null;

window.openRegularModal = function(staffName) {
  editingRegularStaff = staffName;
  document.getElementById('regular-modal-title').textContent = `📆 ${staffName} 정기휴일`;
  const days = regularDays[staffName] || [];
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.classList.toggle('active', days.includes(+btn.dataset.day));
  });
  document.getElementById('modal-regular').classList.add('open');
}
window.closeRegularModal = function() { document.getElementById('modal-regular').classList.remove('open'); }
document.getElementById('modal-regular').addEventListener('click', e => { if(e.target===e.currentTarget) closeRegularModal(); });

window.toggleDayBtn = function(btn) { btn.classList.toggle('active'); }

window.saveRegularDays = function() {
  const selected = [...document.querySelectorAll('.day-btn.active')].map(b => +b.dataset.day);
  update(regularDaysRef, {[editingRegularStaff]: selected});
  closeRegularModal();
  showToast('📆 정기휴일이 저장되었습니다');
}

window.addStaff = function() {
  const name = document.getElementById('new-staff-name').value.trim();
  if (!name) return;
  staffList.push(name);
  set(staffListRef, staffList);
  document.getElementById('new-staff-name').value = '';
  renderStaffList();
  showToast('👤 직원이 추가되었습니다');
}

window.deleteStaff = function(idx) {
  const name = staffList[idx];
  staffList.splice(idx, 1);
  set(staffListRef, staffList);
  // 정기휴일도 삭제
  if (regularDays[name]) remove(ref(db, `regularDays/${name}`));
  renderStaffList();
  showToast('🗑️ 직원이 삭제되었습니다');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeAddModal(); closeCatModal(); closeLeaveModal(); closeStaffModal(); closeRegularModal(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
    if(document.getElementById('modal-add').classList.contains('open')) addItem();
    if(document.getElementById('modal-leave').classList.contains('open')) addLeave();
  }
});
</script>
</body>
</html>
